<div class="p-4 w-full flex flex-col gap-6">
  <!-- Selectors -->
  <div class="flex justify-between items-center">
    <h3 class="text-lg font-semibold">Price History</h3>
    <div class="flex items-center gap-4">
      <!-- Pair Selector -->
      <div class="flex items-center gap-2">
        <label for="pair-select" class="text-sm faded">Pair:</label>
        <select
          id="pair-select"
          [(ngModel)]="selectedPair"
          (ngModelChange)="onPairChange()"
          class="px-3 py-1 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option *ngFor="let pair of availablePairs" [value]="pair.name">
            {{ pair.name.toUpperCase() }}
          </option>
        </select>
      </div>
      
      <!-- Interval Selector -->
      <div class="flex items-center gap-2">
        <label for="interval-select" class="text-sm faded">Interval:</label>
        <select
          id="interval-select"
          [(ngModel)]="selectedInterval"
          (ngModelChange)="onIntervalChange()"
          class="px-3 py-1 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="1m">1 Minute</option>
          <option value="5m">5 Minutes</option>
          <option value="15m">15 Minutes</option>
          <option value="30m">30 Minutes</option>
          <option value="1h">1 Hour</option>
          <option value="2h">2 Hours</option>
          <option value="4h">4 Hours</option>
          <option value="6h">6 Hours</option>
          <option value="12h">12 Hours</option>
          <option value="1d">1 Day</option>
          <option value="1w">1 Week</option>
        </select>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center py-8 text-gray-500">Loading price history...</div>
  <div *ngIf="error" class="text-center py-8 text-red-500">{{ error }}</div>

  <div class="flex flex-row justify-center gap-4" *ngIf="!loading && !error && chain.systemSymbol.value()">
    <div class="stat-card">
      <div class="stat-icon">
        <fa-icon [icon]="icons.solid.tag" class="opacity-70"></fa-icon>
      </div>
      <div class="stat-content">
        <div class="stat-label faded">{{ selectedPair.toUpperCase() }} Current Price</div>
        <div class="stat-value"> {{ formatPriceForDisplay(currentPairPrice || 0) }} </div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">
        <fa-icon [icon]="icons.solid.tags" class="opacity-70"></fa-icon>
      </div>
      <div class="stat-content">
        <div class="stat-label faded">Data Points</div>
        <div class="stat-value"> {{ dataPointsCount || 0 }} </div>
      </div>
    </div>
  </div>

  <!-- Add the echarts container -->
  <div class="w-full" *ngIf="!loading && !error && chartOptions.series">
    <div echarts [options]="chartOptions" class="w-full h-80"></div>
  </div>
</div>
